
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rotacion Rz(theta) Interactiva</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { margin: 0; font-family: Segoe UI, Tahoma, sans-serif; background: #f4f6f8; color: #222; }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 16px; }
    .panel { background: #fff; border: 1px solid #d8dde3; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .row { display: grid; grid-template-columns: 170px 1fr 90px; gap: 10px; align-items: center; margin: 8px 0; }
    .row input[type=range] { width: 100%; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    #plot3d, #plot2d { background: #fff; border: 1px solid #d8dde3; border-radius: 10px; min-height: 520px; }
    .note { font-size: 13px; color: #4c5966; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } #plot3d, #plot2d { min-height: 460px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="row">
        <label for="theta">theta (grados)</label>
        <input id="theta" type="range" min="0" max="360" step="5" value="30" />
        <span id="thetaVal">30</span>
      </div>
      <div class="note">Rz(theta) rota en sentido antihorario sobre XY y conserva Z.</div>
    </div>
    <div class="grid">
      <div id="plot3d"></div>
      <div id="plot2d"></div>
    </div>
  </div>

  <script>
    const puntos = [[1.5,0,0],[0,1.5,0],[1,1,0],[1,0.5,0.8]];
    const L = 1.5;
    function deg2rad(d){ return d*Math.PI/180; }
    function Rz(theta){ const t=deg2rad(theta); return [[Math.cos(t),-Math.sin(t),0],[Math.sin(t),Math.cos(t),0],[0,0,1]]; }
    function mv(M,v){ return [M[0][0]*v[0]+M[0][1]*v[1]+M[0][2]*v[2], M[1][0]*v[0]+M[1][1]*v[1]+M[1][2]*v[2], M[2][0]*v[0]+M[2][1]*v[1]+M[2][2]*v[2]]; }
    function cols(ps){ return {x:ps.map(p=>p[0]), y:ps.map(p=>p[1]), z:ps.map(p=>p[2])}; }
    function circle(n=120,r=1){ const x=[],y=[],z=[]; for(let i=0;i<n;i++){ const a=2*Math.PI*i/(n-1); x.push(r*Math.cos(a)); y.push(r*Math.sin(a)); z.push(0);} return {x,y,z}; }

    function build(theta){
      const R = Rz(theta);
      const pr = puntos.map(p=>mv(R,p));
      const ex = mv(R,[L,0,0]);
      const ey = mv(R,[0,L,0]);
      const c = circle();
      const p0 = cols(puntos);
      const p1 = cols(pr);

      const traces3d = [
        {type:'scatter3d',mode:'lines',x:[0,L],y:[0,0],z:[0,0],line:{color:'red',width:6},name:'x0',opacity:0.35},
        {type:'scatter3d',mode:'lines',x:[0,0],y:[0,L],z:[0,0],line:{color:'green',width:6},name:'y0',opacity:0.35},
        {type:'scatter3d',mode:'lines',x:[0,0],y:[0,0],z:[0,L],line:{color:'blue',width:6},name:'z0',opacity:0.35},
        {type:'scatter3d',mode:'lines',x:[0,ex[0]],y:[0,ex[1]],z:[0,ex[2]],line:{color:'darkred',width:8},name:"x'"},
        {type:'scatter3d',mode:'lines',x:[0,ey[0]],y:[0,ey[1]],z:[0,ey[2]],line:{color:'darkgreen',width:8},name:"y'"},
        {type:'scatter3d',mode:'lines',x:[0,0],y:[0,0],z:[0,L],line:{color:'darkblue',width:8},name:"z' (sin cambio)"},
        {type:'scatter3d',mode:'markers',x:p0.x,y:p0.y,z:p0.z,marker:{size:5,color:'purple'},opacity:0.45,name:'Puntos originales'},
        {type:'scatter3d',mode:'markers',x:p1.x,y:p1.y,z:p1.z,marker:{size:7,color:'purple',symbol:'square',line:{width:1,color:'black'}},name:'Puntos rotados'},
        {type:'scatter3d',mode:'lines',x:c.x,y:c.y,z:c.z,line:{color:'cyan',width:2},opacity:0.35,name:'Circulo XY'}
      ];
      for(let i=0;i<puntos.length;i++){ traces3d.push({type:'scatter3d',mode:'lines',x:[puntos[i][0],pr[i][0]],y:[puntos[i][1],pr[i][1]],z:[puntos[i][2],pr[i][2]],line:{color:'gray',width:2,dash:'dot'},opacity:0.35,showlegend:false}); }

      const t = deg2rad(theta);
      const arx=[], ary=[];
      for(let i=0;i<80;i++){ const a=t*i/79; arx.push(0.5*Math.cos(a)); ary.push(0.5*Math.sin(a)); }

      const traces2d = [
        {type:'scatter',mode:'lines',x:[0,L],y:[0,0],line:{color:'red',width:4},name:'x0',opacity:0.35},
        {type:'scatter',mode:'lines',x:[0,0],y:[0,L],line:{color:'green',width:4},name:'y0',opacity:0.35},
        {type:'scatter',mode:'lines',x:[0,ex[0]],y:[0,ex[1]],line:{color:'darkred',width:5},name:"x'"},
        {type:'scatter',mode:'lines',x:[0,ey[0]],y:[0,ey[1]],line:{color:'darkgreen',width:5},name:"y'"},
        {type:'scatter',mode:'lines',x:c.x,y:c.y,line:{color:'cyan',width:2},opacity:0.35,name:'Circulo unitario'},
        {type:'scatter',mode:'lines',x:arx,y:ary,line:{color:'orange',width:4},fill:'tozeroy',fillcolor:'rgba(255,165,0,0.2)',name:`theta=${theta}°`},
        {type:'scatter',mode:'markers',x:p0.x,y:p0.y,marker:{size:8,color:'purple'},opacity:0.45,name:'Puntos originales'},
        {type:'scatter',mode:'markers',x:p1.x,y:p1.y,marker:{size:10,color:'purple',symbol:'square',line:{width:1,color:'black'}},name:'Puntos rotados'}
      ];
      for(let i=0;i<puntos.length;i++){ traces2d.push({type:'scatter',mode:'lines',x:[puntos[i][0],pr[i][0]],y:[puntos[i][1],pr[i][1]],line:{color:'gray',width:1.5,dash:'dot'},opacity:0.35,showlegend:false}); }

      const ct = Math.cos(t).toFixed(3), st = Math.sin(t).toFixed(3);
      const matrix = `Rz(${theta}°)<br>[ ${ct}  ${(-Math.sin(t)).toFixed(3)}  0 ]<br>[ ${st}   ${ct}  0 ]<br>[ 0  0  1 ]`;

      return {
        traces3d,
        layout3d: {title:`Rotacion Rz(${theta}°) - Vista 3D`,scene:{xaxis:{title:'X',range:[-2,2]},yaxis:{title:'Y',range:[-2,2]},zaxis:{title:'Z',range:[-0.5,2]},aspectmode:'cube',camera:{eye:{x:1.3,y:1.3,z:0.9}}},margin:{l:0,r:0,t:45,b:0},legend:{x:0.01,y:0.99}},
        traces2d,
        layout2d: {title:'Vista superior (plano XY)',xaxis:{title:'X',range:[-2,2],zeroline:true},yaxis:{title:'Y',range:[-2,2],scaleanchor:'x',scaleratio:1,zeroline:true},margin:{l:55,r:20,t:45,b:50},legend:{x:0.01,y:0.99},annotations:[{xref:'paper',yref:'paper',x:0.02,y:0.98,text:matrix,showarrow:false,align:'left',font:{family:'monospace',size:12},bgcolor:'rgba(245,222,179,0.85)',bordercolor:'rgba(120,120,120,0.6)',borderwidth:1}]}
      };
    }

    const thetaEl = document.getElementById('theta');
    const thetaVal = document.getElementById('thetaVal');
    function render(){
      const theta = Number(thetaEl.value);
      thetaVal.textContent = String(theta);
      const d = build(theta);
      Plotly.react('plot3d', d.traces3d, d.layout3d, {responsive:true});
      Plotly.react('plot2d', d.traces2d, d.layout2d, {responsive:true});
    }
    thetaEl.addEventListener('input', render);
    render();
  </script>
</body>
</html>
